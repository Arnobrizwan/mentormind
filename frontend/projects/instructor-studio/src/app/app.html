<div class="frame">
  <header class="topbar">
    <a routerLink="/" class="brand">
      <span class="brand__mark" aria-hidden="true">▤</span>
      {{ config.siteName() }} <span class="brand__sub">/ Instructor Studio</span>
    </a>
    <div class="topbar__right">
      @if (auth.user(); as user) {
        @if (auth.isInstructor()) {
          <nav class="topbar__nav" aria-label="Studio">
            <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }" class="tag">
              Courses
            </a>
            <a routerLink="/student-success" routerLinkActive="is-active" class="tag">Student Success</a>
          </nav>
        }
        <span class="tag">{{ user.display_name || user.email }}</span>
        @if (!auth.isInstructor()) {
          <span class="tag topbar__warn">no instructor role</span>
        }
        <button type="button" class="btn btn--line btn--sm" (click)="logout()">Sign out</button>
      }
    </div>
  </header>

  <main class="page">
    <router-outlet />
  </main>

  <footer class="footbar">
    <span class="tag">Drafting desk · rev {{ '2026' }} · all changes go live on publish</span>
  </footer>
</div>
