<div class="frame">
  <header class="topbar">
    <a routerLink="/" class="brand">
      <span class="brand__cursor blink" aria-hidden="true">█</span>
      {{ config.siteName().toLowerCase() }}<span class="brand__path">:~/ops$</span> admin-console
    </a>
    <div class="topbar__right">
      <button
        type="button"
        class="theme-toggle"
        (click)="theme.toggle()"
        [attr.aria-label]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        [title]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        <span aria-hidden="true">{{ theme.theme() === 'dark' ? '☀️' : '🌙' }}</span>
      </button>
      @if (auth.user(); as user) {
        <a routerLink="/system" class="label topbar__link">system</a>
        <span class="label">{{ user.email }}</span>
        @if (!auth.isStaff()) {
          <span class="label topbar__warn">NOT STAFF</span>
        }
        <button type="button" class="btn btn--sm" (click)="logout()">logout</button>
      }
    </div>
  </header>

  <main class="page">
    <router-outlet />
  </main>

  <footer class="footbar">
    <span class="label">mentormind ops · flags + settings apply live, no redeploy</span>
  </footer>
</div>
