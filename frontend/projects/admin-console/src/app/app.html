<div class="frame">
  <header class="topbar">
    <a routerLink="/" class="brand">
      <span class="brand__cursor blink" aria-hidden="true">█</span>
      mentormind<span class="brand__path">:~/ops$</span> admin-console
    </a>
    <div class="topbar__right">
      @if (auth.user(); as user) {
        <span class="label">{{ user.email }}</span>
        @if (!auth.isStaff()) {
          <span class="label topbar__warn">NOT STAFF</span>
        }
        <button type="button" class="btn btn--sm" (click)="logout()">logout</button>
      }
    </div>
  </header>

  <main class="page">
    <router-outlet />
  </main>

  <footer class="footbar">
    <span class="label">mentormind ops · flags + settings apply live, no redeploy</span>
  </footer>
</div>
