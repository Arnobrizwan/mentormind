# MentorMind — full local architecture.
# Demonstrates: load balancing (nginx -> api-1/api-2), Postgres streaming
# replication (primary -> replica), Redis cache/broker, Celery workers,
# Prometheus + Grafana monitoring.
#
#   docker compose up --build
#   App API:    http://localhost:8080/api/v1/health/   (X-Served-By alternates)
#   Grafana:    http://localhost:3000  (admin / admin)
#   Prometheus: http://localhost:9090

x-backend-env: &backend-env
  SECRET_KEY: ${SECRET_KEY:-local-compose-secret}
  DEBUG: "False"
  ALLOWED_HOSTS: "*"
  DATABASE_URL: postgres://mentormind:${DB_PASSWORD:-mentormind}@postgres-primary:5432/mentormind
  REPLICA_URL: postgres://mentormind:${DB_PASSWORD:-mentormind}@postgres-replica:5432/mentormind
  REDIS_URL: redis://redis:6379/0
  ML_SERVICE_URL: http://ml-service:9000

services:
  postgres-primary:
    image: bitnami/postgresql:latest
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: ${REPL_PASSWORD:-replicate}
      POSTGRESQL_USERNAME: mentormind
      POSTGRESQL_PASSWORD: ${DB_PASSWORD:-mentormind}
      POSTGRESQL_DATABASE: mentormind
    volumes:
      - pg_primary_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentormind -d mentormind"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-replica:
    image: bitnami/postgresql:latest
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: ${REPL_PASSWORD:-replicate}
      POSTGRESQL_MASTER_HOST: postgres-primary
      POSTGRESQL_MASTER_PORT_NUMBER: "5432"
      POSTGRESQL_PASSWORD: ${DB_PASSWORD:-mentormind}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentormind"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: ../backend
    command: python manage.py migrate --noinput
    environment: *backend-env
    depends_on:
      postgres-primary:
        condition: service_healthy

  api-1:
    build: ../backend
    environment:
      <<: *backend-env
      INSTANCE_NAME: api-1
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  api-2:
    build: ../backend
    environment:
      <<: *backend-env
      INSTANCE_NAME: api-2
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: ../backend
    command: celery -A config worker --loglevel=info
    environment:
      <<: *backend-env
      INSTANCE_NAME: worker-1
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  ml-service:
    build: ../ml-service
    environment:
      INSTANCE_NAME: ml-1
      FLAGS_URL: http://nginx/api/v1/flags/
    ports:
      - "9000:9000"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api-1
      - api-2

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pg_primary_data:
  grafana_data:
