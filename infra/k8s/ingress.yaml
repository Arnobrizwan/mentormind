apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mentormind
  namespace: mentormind
  annotations:
    # Long-lived connections for the Channels websocket chat
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /ml
            pathType: Prefix
            backend:
              service:
                name: ml-service
                port:
                  number: 9000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
