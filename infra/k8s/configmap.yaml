apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: mentormind
data:
  DEBUG: "False"
  ALLOWED_HOSTS: "*"
  REDIS_URL: redis://redis:6379/0
  ML_SERVICE_URL: http://ml-service:9000
  # Point REPLICA_URL at a read replica (e.g. Neon) to activate the
  # read/write splitting router; omit to run single-database.
