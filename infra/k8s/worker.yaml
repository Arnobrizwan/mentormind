apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: mentormind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: mentormind-backend:latest
          command: ["celery", "-A", "config", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          env:
            - name: INSTANCE_NAME
              value: worker
            # Explicit (also present via envFrom backend-secrets): the key
            # the backend forwards as X-API-Key to ml-service.
            - name: ML_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: ML_API_KEY
          # Celery has no HTTP server — ping the worker over the broker.
          # $HOSTNAME needs a shell to expand, hence sh -c.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - celery -A config inspect ping -d celery@$HOSTNAME
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 192Mi
            limits:
              memory: 512Mi
