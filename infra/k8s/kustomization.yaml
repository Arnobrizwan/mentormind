apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres.yaml
  - redis.yaml
  - migrate-job.yaml
  - api.yaml
  - worker.yaml
  - ml-service.yaml
  - ingress.yaml
  - hpa.yaml

# Point at your registry-pushed builds:
#   kustomize edit set image mentormind-backend=ghcr.io/you/mentormind-backend:sha
images:
  - name: mentormind-backend
    newTag: latest
  - name: mentormind-ml-service
    newTag: latest
