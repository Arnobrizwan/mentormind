apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: mentormind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: mentormind-ml-service:latest
          ports:
            - containerPort: 9000
          env:
            - name: FLAGS_URL
              value: http://api:8000/api/v1/flags/
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: mentormind
spec:
  selector:
    app: ml-service
  ports:
    - port: 9000
