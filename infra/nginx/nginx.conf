# Round-robin load balancer over the two Django instances.
upstream mentormind_api {
    server api-1:8000;
    server api-2:8000;
}

# HTTP micro-cache: absorbs read stampedes on the public course catalog.
# 5s TTL means the cache never lags content edits noticeably, yet a burst
# of 10k req/s only lets ~0.2 req/s through to Django.
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m
                 max_size=64m inactive=60s use_temp_path=off;

# Rate limiting: a tight zone for credential endpoints (brute-force guard)
# and a moderate one for the CPU-heavy ML inference paths.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=ml_limit:10m rate=5r/s;

server {
    listen 80;

    # Baseline security headers on every response (Django also sets its own
    # for app routes; these cover cached and proxied paths uniformly).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    # Sane default for JSON API bodies; the /ml/ location raises this for
    # image uploads.
    client_max_body_size 2m;

    # Compress API responses (JSON payloads shrink ~5-10x).
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types application/json application/javascript application/xml
               text/plain text/css text/javascript text/xml image/svg+xml;

    # Django's prometheus exporter must never be internet-readable —
    # Prometheus scrapes api-1/api-2 directly on the docker network.
    # Placed before the catch-all `location /`.
    location = /metrics {
        deny all;
    }

    # Credential endpoints: tight per-IP limit against brute force /
    # credential stuffing. burst=5 smooths legitimate retries.
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://mentormind_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://mentormind_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Which upstream container actually answered (backend also sets X-Served-By)
        add_header X-Upstream $upstream_addr always;
    }

    # Micro-cached public catalog (anonymous requests only — authed requests
    # carry an Authorization header and bypass the cache).
    location /api/v1/courses/ {
        proxy_pass http://mentormind_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_cache api_cache;
        proxy_cache_valid 200 5s;
        proxy_cache_key "$request_uri";
        proxy_cache_bypass $http_authorization;
        proxy_no_cache $http_authorization;
        proxy_cache_use_stale updating error timeout;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Upstream $upstream_addr always;
    }

    # Websocket chat (Django Channels over the ASGI workers)
    location /ws/ {
        proxy_pass http://mentormind_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /ml/ {
        # Moderate per-IP limit for inference; OMR/OCR uploads run up to 8MB.
        limit_req zone=ml_limit burst=10 nodelay;
        limit_req_status 429;
        client_max_body_size 10m;

        proxy_pass http://ml-service:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
