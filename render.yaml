# One-click Render deployment (free tier) — the live demo configuration.
#
# Ephemeral SQLite by design: every deploy/restart re-runs migrate +
# seed_demo, so the public demo resets itself to a clean, fully-featured
# state. Point DATABASE_URL at a real Postgres for a persistent install.
# No Redis needed: settings fall back to in-memory cache + eager Celery.
# Do NOT set DATABASE_URL (SQLite) or REDIS_URL — both are paid upgrades.
# Do NOT set Stripe/OpenAI/Mistral keys — not used in this stack.

services:
  - type: web
    name: mentormind-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash render-start.sh
    healthCheckPath: /api/v1/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: mentormind-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://mentormind-demo.vercel.app,https://mentormind-studio.vercel.app,https://localhost,capacitor://localhost,http://localhost
      - key: INSTANCE_NAME
        value: render-free
      - key: ML_SERVICE_URL
        value: https://arnob666666-mentormind-ml.hf.space
      - key: TUTOR_MODEL_URL
        value: https://arnob666666-mentormind-ml.hf.space/v1/tutor/answer
      # Must match HF Space secret ML_API_KEY (see docs/FREE-DEMO-STACK.md).
      - key: ML_API_KEY
        value: mentormind-public-demo-ml-key
      - key: TUTOR_MODEL_TIMEOUT_SECONDS
        value: "60"
